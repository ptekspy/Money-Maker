name: Deploy AWS previews

on:
  push:
    branches:
      - codex/aws-previews
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: sst-preview
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CONTRACTGUARD_GITHUB_APP_ID: ${{ secrets.CONTRACTGUARD_GITHUB_APP_ID }}
      CONTRACTGUARD_GITHUB_CLIENT_ID: ${{ secrets.CONTRACTGUARD_GITHUB_CLIENT_ID }}
      CONTRACTGUARD_GITHUB_CLIENT_SECRET: ${{ secrets.CONTRACTGUARD_GITHUB_CLIENT_SECRET }}
      CONTRACTGUARD_GITHUB_PRIVATE_KEY: ${{ secrets.CONTRACTGUARD_GITHUB_PRIVATE_KEY }}
      CONTRACTGUARD_GITHUB_WEBHOOK_SECRET: ${{ secrets.CONTRACTGUARD_GITHUB_WEBHOOK_SECRET }}
      CONTRACTGUARD_MARKETPLACE_WEBHOOK_SECRET: ${{ secrets.CONTRACTGUARD_MARKETPLACE_WEBHOOK_SECRET }}
      CONTRACTGUARD_GITHUB_APP_SLUG: ${{ vars.CONTRACTGUARD_GITHUB_APP_SLUG }}
      CONTRACTGUARD_SESSION_SECRET: ${{ secrets.CONTRACTGUARD_SESSION_SECRET }}
      CONTRACTGUARD_APP_URL: ${{ vars.CONTRACTGUARD_APP_URL }}
      CONTRACTGUARD_STRIPE_SECRET_KEY: ${{ secrets.CONTRACTGUARD_STRIPE_SECRET_KEY }}
      CONTRACTGUARD_STRIPE_WEBHOOK_SECRET: ${{ secrets.CONTRACTGUARD_STRIPE_WEBHOOK_SECRET }}
      CONTRACTGUARD_STRIPE_STARTER_PRICE_ID: ${{ vars.CONTRACTGUARD_STRIPE_STARTER_PRICE_ID }}
      CONTRACTGUARD_STRIPE_PRO_PRICE_ID: ${{ vars.CONTRACTGUARD_STRIPE_PRO_PRICE_ID }}
      CONTRACTGUARD_STRIPE_TEAMS_PRICE_ID: ${{ vars.CONTRACTGUARD_STRIPE_TEAMS_PRICE_ID }}
      CONTRACTGUARD_STRIPE_TEAMS_SEAT_PRICE_ID: ${{ vars.CONTRACTGUARD_STRIPE_TEAMS_SEAT_PRICE_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run check

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Clear stale preview deployment lock
        run: npx sst unlock --stage preview

      - run: npm run deploy:aws -- --stage preview

      - name: Verify deployed public services and integrations
        run: node .github/scripts/contractguard-smoke.mjs
