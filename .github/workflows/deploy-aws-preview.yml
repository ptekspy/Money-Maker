name: Deploy AWS previews

on:
  push:
    branches:
      - codex/aws-previews
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: sst-preview
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: aws-preview
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run check

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-2

      - run: npm run deploy:aws -- --stage preview
